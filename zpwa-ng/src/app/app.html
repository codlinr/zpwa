<header class="app-header" *ngIf="isAuthenticated()">
  <div class="branding">
    <span class="title">{{ title() }}</span>
    <span class="version" *ngIf="version()">v{{ version() }}</span>
  </div>

  <div class="status" [class.status-offline]="networkState.isOffline()">
    <span *ngIf="networkState.isOffline()">⚠️ Backend offline</span>
    <span *ngIf="networkState.isOnline()">✓ Backend online</span>
  </div>

  <nav class="nav">
    <span class="pending-sync" *ngIf="offlineQueue.pendingCount() > 0">
      Pending: {{ offlineQueue.pendingCount() }}
    </span>
    <button
      type="button"
      class="sync-btn"
      *ngIf="offlineQueue.pendingCount() > 0"
      [disabled]="syncing()"
      (click)="runSync()"
    >
      {{ syncing() ? 'Syncing…' : 'Sync' }}
    </button>
    <a routerLink="/equipment">Equipment</a>
    <a routerLink="/work-orders">Work orders</a>
    <button type="button" (click)="logout()">Sign out</button>
  </nav>
</header>

<main class="app-main">
  <router-outlet />
</main>
